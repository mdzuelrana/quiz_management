{% extends "dashboard/student_dashboard.html" %}

{% block student_dash %}
<h2 class="text-2xl font-bold mb-4">Quiz Result</h2>

<div class="bg-gray-100 p-6 rounded shadow">
    <p><strong>Quiz:</strong> {{ attempt.quiz.title }}</p>
    <p><strong>Score:</strong> {{ attempt.score }} / {{ attempt.quiz.total_marks }}</p>
    <p><strong>Submitted:</strong> {{ attempt.submitted_at }}</p>
</div>
{% endblock %}
