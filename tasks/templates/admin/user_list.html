{% extends "dashboard/admin_dashboard.html" %}

{% block admin_dash %}
<section class="h-screen">
<h2 class="text-2xl font-bold mb-6">
    All Users
</h2>

<table class="w-full bg-white shadow rounded">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-2 text-left">Name</th>
            <th class="p-2 text-left">Email</th>
            <th class="p-2 text-center">Join Date</th>
            <th class="p-2 text-center">Role</th>
            <th class="p-2 text-center">Change Role</th>
        </tr>
    </thead>

    <tbody>
        {% for user in users %}
        <tr class="border-t text-center">

            <td class="p-2 text-left font-semibold">
                {{ user.username }}
            </td>

            <td class="p-2 text-left">
                {{ user.email }}
            </td>

            <td class="p-2 text-sm text-gray-600">
                {{ user.date_joined|date:"d M Y" }}
            </td>

            <td class="p-2">
                <span class="px-3 py-1 rounded 
                    {% if user.role == 'admin' %} bg-purple-500
                    {% elif user.role == 'teacher' %} bg-blue-500
                    {% else %} bg-green-500 {% endif %}
                    text-white">
                    {{ user.role|title }}
                </span>
            </td>

            <td class="p-2">
                <form method="post"
                      action="{% url 'change_user_role' user.id %}">
                    {% csrf_token %}

                    <select name="role"
                            class="border p-1 rounded">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>

                    <button type="submit"
                            class="bg-red-500 text-white px-3 py-1 rounded">
                        Update
                    </button>
                </form>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>
</section>
{% endblock %}
