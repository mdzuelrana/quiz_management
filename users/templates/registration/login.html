{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">

        <!-- Logo / Title -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Welcome Back </h2>
            <p class="text-gray-500 text-sm">Sign in to your account</p>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Username
                </label>
                <input type="text" name="username"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                       placeholder="Enter your username" required>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password" name="password"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                       placeholder="Enter your password" required>
            </div>

            <!-- Remember + Forgot -->
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-500">
                    Remember me
                </label>
                <a href="#" class="text-blue-500 hover:underline">
                    Forgot password?
                </a>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg transition duration-300 font-semibold">
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Don’t have an account?
            <a href="{% url 'sign_up' %}" class="text-blue-500 hover:underline">
                Sign Up
            </a>
        </p>

    </div>
</section>
{% endblock %}
